# Weekly live-response watcher: refreshes demo/examples against the real USPTO ODP
# API and opens an issue if any recorded response changed. Add USPTO_API_KEY
# (and USPTO_TSDR_API_KEY) as repository secrets.
name: response-watch

on:
  schedule:
    - cron: "37 6 * * 1" # Mondays 06:37 UTC (offset from spec-watch)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  responses:
    runs-on: ubuntu-latest
    env:
      USPTO_API_KEY: ${{ secrets.USPTO_API_KEY }}
      USPTO_TSDR_API_KEY: ${{ secrets.USPTO_TSDR_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Refresh recorded examples from the live API
        run: make examples
      - name: Detect response drift
        id: diff
        run: |
          if [ -n "$(git status --porcelain demo/examples 2>/dev/null)" ]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            { echo "summary<<EOF"; git --no-pager diff --stat demo/examples; echo "EOF"; } >> "$GITHUB_OUTPUT"
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Open or update response-drift issue
        if: steps.diff.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Live API response drift detected';
            const body = [
              'The weekly response-watch run found that recorded `demo/examples` responses',
              'changed against the live API since they were last committed.',
              '',
              '```',
              `${{ steps.diff.outputs.summary }}`,
              '```',
              '',
              'Run `make examples`, review the diff, and commit if the changes are expected.',
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'response-drift',
            });
            if (issues.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['response-drift'],
              });
            }
