        '404': { $ref: ./trial-common.yaml#/components/schemas/NotFound }
        '413': { $ref: ./trial-common.yaml#/components/schemas/Status413 }
        '500': { $ref: ./trial-common.yaml#/components/schemas/InternalError }

  /api/v1/patent/interferences/{interferenceNumber}/decisions:
    get:
      tags : [PTAB Interferences]
      summary: Retrieve interferences decisions by interference number
      description: Returns one or more interference decision records for the provided `interferenceNumber`.
      parameters:
        - name: interferenceNumber
          in: path
          required: true
          description: Interference number (e.g., 103751).
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ./trial-common.yaml#/components/schemas/InterferenceDecisionDataResponse
        '400': { $ref: ./trial-common.yaml#/components/schemas/BadRequest }
        '403': { $ref: ./trial-common.yaml#/components/schemas/Forbidden }
        '404': { $ref: ./trial-common.yaml#/components/schemas/NotFound }
        '413': { $ref: ./trial-common.yaml#/components/schemas/Status413 }
        '500': { $ref: ./trial-common.yaml#/components/schemas/InternalError }

  /api/v1/patent/interferences/decisions/{documentIdentifier}:
    get:
      tags : [PTAB Interferences]
      summary: Retrieve interferences decisions by document identifier
      description: Returns a single interference decision document for the provided `documentIdentifier`.
      parameters:
        - name: documentIdentifier
          in: path
          required: true
          description: Unique document identifier (opaque string).
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ./trial-common.yaml#/components/schemas/InterferenceDecisionDataResponse
        '400': { $ref: ./trial-common.yaml#/components/schemas/BadRequest }
        '403': { $ref: ./trial-common.yaml#/components/schemas/Forbidden }
        '404': { $ref: ./trial-common.yaml#/components/schemas/NotFound }
        '413': { $ref: ./trial-common.yaml#/components/schemas/Status413 }
        '500': { $ref: ./trial-common.yaml#/components/schemas/InternalError }
