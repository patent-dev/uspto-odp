openapi: 3.0.1
info:
  title: ODP Shared Components (Schemas)
  version: 1.0.0
  description: Centralized reusable schemas referenced by swagger.yaml
components:
  schemas:
    PatentSearchRequest:
      type: object
      properties:
        q:
          type: string
          example: "applicationMetaData.applicationTypeLabelName:Utility"
          description: Search by field value or pass opensearch string query syntax
        filters:
          type: array
          items:
            $ref: '#/components/schemas/Filter'
        rangeFilters:
          type: array
          items:
            $ref: '#/components/schemas/Range'
        sort:
          type: array
          items:
            $ref: '#/components/schemas/Sort'
        fields:
          type: array
          items:
            type: string
          example: ['applicationNumberText','correspondenceAddressBag','applicationMetaData.filingDate']
        pagination:
          $ref: '#/components/schemas/Pagination'
        facets:
          type: array
          items:
            type: string
          example: ['applicationMetaData.applicationTypeLabelName','applicationMetaData.applicationStatusCode']

    PatentDownloadRequest:
      type: object
      properties:
        q:
          type: string
          example: "applicationMetaData.applicationTypeLabelName:Utility"
          description: Search by field value or pass opensearch string query syntax
        filters:
          type: array
          items:
            $ref: '#/components/schemas/Filter'
        rangeFilters:
          type: array
          items:
            $ref: '#/components/schemas/Range'
        sort:
          type: array
          items:
            $ref: '#/components/schemas/Sort'
        fields:
          type: array
          items:
            type: string
          example: ['applicationNumberText','correspondenceAddressBag','applicationMetaData.filingDate']
        pagination:
          $ref: '#/components/schemas/Pagination'
        format:
          type: string
          example: json
          enum: [json, csv]
          description: Download format. csv or json

    PatentDataResponse:
      type: object
      description: This json structure represents all data fields possible for a patent application. Not all fields mentioned here will be returned in API response, only fields that have data should present in the response.
      properties:
        count:
          type: integer
          example: 1
        patentFileWrapperDataBag:
          type: array
          items:
            type: object
            properties:
              applicationNumberText:
                type: string
                example: 14104993
                description: Free format of application number
              applicationMetaData:
                $ref: '#/components/schemas/ApplicationMetaData'
              correspondenceAddressBag:
                type: array
                items:
                  type: object
                  properties:
                    nameLineOneText:
                      type: string
                      example: Seed IP Law Group LLP/ST (EP ORIGINATING)
                    nameLineTwoText:
                      type: string
                      example: Attn- IP Docket
                    addressLineOneText:
                      type: string
                      example: 701 FIFTH AVENUE, SUITE 5400
                    addressLineTwoText:
                      type: string
                      example: Suite 501
                    geographicRegionName:
                      type: string
                      example: WASHINGTON
                    geographicRegionCode:
                      type: string
                      example: WA
                    postalCode:
                      type: string
                      example: 98104-7092
                    cityName:
                      type: string
                      example: SEATTLE
                    countryCode:
                      type: string
                      example: US
                    countryName:
                      type: string
                      example: USA
                    postalAddressCategory:
                      type: string
                      example: commercial
                description: Collection of correspondences
              assignmentBag:
                type: array
                items:
                  $ref: '#/components/schemas/Assignment'
              recordAttorney:
                $ref: '#/components/schemas/RecordAttorney'
              foreignPriorityBag:
                type: array
                items:
                  $ref: '#/components/schemas/ForeignPriority'
              parentContinuityBag:
                type: array
                items:
                  $ref: '#/components/schemas/ParentContinuityData'
              childContinuityBag:
                type: array
                items:
                  $ref: '#/components/schemas/ChildContinuityData'
              patentTermAdjustmentData:
                $ref: '#/components/schemas/PatentTermAdjustment'
              eventDataBag:
                type: array
                items:
                  $ref: '#/components/schemas/EventData'
              pgpubDocumentMetaData:
                $ref: '#/components/schemas/PGPubFileMetaData'
              grantDocumentMetaData:
                $ref: '#/components/schemas/GrantFileMetaData'
              lastIngestionDateTime:
                type: string
                example: 2024-09-15T21:19:01
                format: yyyy-MM-ddTHH:mm:ss
        facets:
          type: array
          items:
            type: object
            properties:
              applicationStatusCode:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                      example: Utility
                    count:
                      type: integer
                      example: 44673

    StatusCodeSearchRequest:
      type: object
      properties:
        q:
          type: string
          example: "applicationStatusCode:120"
          description: Search by field value or pass opensearch string query syntax
        pagination:
          $ref: '#/components/schemas/Pagination'

    StatusCodeSearchResponse:
      type: object
      description: This json structure represents data fields for status codes search API
      properties:
        count:
          type: integer
          example: 1
        statusCodeBag:
          type: array
          items:
            type: object
            properties:
              applicationStatusCode:
                type: integer
                example: 60
                description: Application status code
              applicationStatusDescriptionText:
                type: string
                example: Final Rejection Counted, Not Yet Mailed
                description: Application status code description
        requestIdentifier:
          type: string
          example: 07c5c24d-bf8e-458c-9427-a038500d6e98
    DocumentBag:
      type: object
      properties:
        documentBag:
          type: array
          items:
            properties:
              applicationNumberText:
                type: string
                example: 16123123
              officialDate:
                type: string
                example: 2020-08-31T01:20:29.000-0400
              documentIdentifier:
                type: string
                example: LDXBTPQ7XBLUEX3
              documentCode:
                type: string
                example: WFEE
              documentCodeDescriptionText:
                type: string
                example: Fee Worksheet (SB06)
              documentDirectionCategory:
                type: string
                example: INTERNAL
              downloadOptionBag:
                type: array
                items:
                  properties:
                    mimeTypeIdentifier:
                      type: string
                      example: PDF
                    downloadUrl:
                      type: string
                      example: https://api.uspto.gov/api/v1/patent/application/documents/16123123/LDXBTPQ7XBLUEX3.pdf
                    pageTotalQuantity:
                      type: integer
                      example: 2

    Filter:
      type: object
      description: Add filters to your search request by providing filter name and filter value where name in filter request some field in data set.
      properties:
        name:
          type: string
          example: applicationMetaData.applicationStatusDescriptionText
        value:
          type: array
          items:
            type: string
            example: Patented Case

    Range:
      type: object
      description: Range filter. Provide field from dataset and valueFrom and valueTo. If range filter is for date field, date must be in “yyyy-MM-dd” format
      properties:
        field:
          type: string
          example: applicationMetaData.grantDate
        valueFrom:
          type: string
          example: '2010-08-04'
        valueTo:
          type: string
          example: '2022-08-04'

    Sort:
      type: object
      description: Sort you search result by providing field to be sorted and sort order
      properties:
        field:
          type: string
          format: '123456789'
          example: applicationMetaData.filingDate
        order:
          type: string
          description: Sort order. e.g. Asc, ASC, Desc, desc, DESC
          example: desc
          enum: [Asc, asc, Desc, desc]
    Pagination:
      type: object
      description: Pagination information.
      properties:
        offset:
          type: integer
          format: int32
          minimum: 0
          example: 0
          default: 0
          description: Start
        limit:
          type: integer
          format: int32
          minimum: 1
          default: 25
          example: 25
          description: Maximum number of patent records to be returned in response
    Facet:
      type: object
      description: Facet Description
      properties:
        value:
          type: string
        count:
          type: integer

    ApplicationMetaData:
      type: object
      description: Represents patent application meta data properties
      properties:
        nationalStageIndicator:
          type: boolean
          description: Indicates whether this application is a national application which entered the national stage from an international PCT application
        entityStatusData:
          type: object
          description: Indicates the applicant's entity status
          properties:
            smallEntityStatusIndicator:
              type: boolean
              description: Indicates whether the applicant qualifies for small entity status
            businessEntityStatusCategory:
              type: string
              example: Undiscounted
              description: Status of business entity being established for the purpose of paying a fee such as a filing fee and a maintenance fee
        publicationDateBag:
          type: array
          items:
            type: string
            format: 'yyyy-MM-dd'
            example: '2014-06-19'
        publicationSequenceNumberBag:
          type: array
          items:
            type: string
            example: 0167116
        publicationCategoryBag:
          type: array
          items:
            type: string
            example: ["Granted/Issued","Pre-Grant Publications - PGPub"]
        docketNumber:
          type: string
          example: 12GR10425US01/859063.688
        firstInventorToFileIndicator:
          type: string
          example: Y
        firstApplicantName:
          type: string
          example: STMicroelectronics S.A.
        firstInventorName:
          type: string
          example: Pascal Chevalier
        applicationConfirmationNumber:
          type: number
          example: 1061
        applicationStatusDate:
          type: "string"
          format: "yyyy-MM-dd"
          example: '2016-05-18'
        applicationStatusDescriptionText:
          type: string
          example: Patented Case
        filingDate:
          type: string
          format: "yyyy-MM-dd"
          example: '2012-12-19'
          description: The date assigned by the Patent Office that identifies when an application meets certain criteria to qualify as having been filed. Refers to ST.9 INID Code 22.
        effectiveFilingDate:
          type: string
          format: "yyyy-MM-dd"
          example: '2013-12-12'
          description: The date according to PTO criteria that the patent case qualified as having been 'filed'.  The effective filing date is the same or later than the Filing Date.  The filing date can be changed due to a subsequent action on an application patent case.
        grantDate:
          type: string
          format: "yyyy-MM-dd"
          example: '2016-06-07'
        groupArtUnitNumber:
          type: string
          example: TTAB
          description: GAU Code
        applicationTypeCode:
          type: string
          example: UTL
          description: Code corresponding to Utility, Plant, Design, or Reissue
        applicationTypeLabelName:
          type: string
          example: Utility
        applicationTypeCategory:
          type: string
          example: electronics
        inventionTitle:
          type: string
          example: HETEROJUNCTION BIPOLAR TRANSISTOR
        patentNumber:
          type: string
          example: 9362380
        applicationStatusCode:
          type: integer
          example: 150
        earliestPublicationNumber:
          type: string
          example: US 2014-0167116 A1
          description: Publication number corresponding to the earliest publication
        earliestPublicationDate:
          type: string
          format: "yyyy-MM-dd"
          example: '2014-06-19'
        pctPublicationNumber:
          type: string
          example: WO 2009/064413
          description: The unique identifier assigned to the publication of an international patent application in the PCT Gazette by the International Bureau (IB) of the World Intellectual Property Organization (WIPO).
        pctPublicationDate:
          type: string
          format: "yyyy-MM-dd"
          example: '2016-12-16'
        internationalRegistrationPublicationDate:
          type: string
          format: "yyyy-MM-dd"
          example: '2016-12-16'
          description: The date that the IPR is published by the International Bureau
        internationalRegistrationNumber:
          type: string
          example: DM/091304
          description: The number assigned by the International Bureau to an international registration upon registering an industrial design, a trademark or other type of IPR in the International Register
        examinerNameText:
          type: string
          example: HUI TSAI JEY
          description: Name of patent examiner
        class:
          type: string
          example: 257
          description: The first hierarchical level in the USPC classification schedule
        subclass:
          type: string
          example: 197000
          description: The second highest hierarchical level  in the USP C classification schedule
        uspcSymbolText:
          type: string
          example: 257/197000
          description: The first hierarchical level in the USPC classification schedule/ The second highest hierarchical level in the USP C classification schedule

        customerNumber:
          type: integer
          example: 38106
          description: Correspondence address of the application inherited from the customer.
        cpcClassificationBag:
          type: array
          items:
            type: string
          example: [H01L29/66325,H01L27/0623,H01L29/7378,H01L21/8249,H01L29/737,H01L29/66242]
          description: Collection of Classifications for CPC
        applicantBag:
          type: array
          items:
            type: object
            properties:
              applicantNameText:
                type: string
                example: John Smith
              firstName:
                type: string
                example: John
              middleName:
                type: string
                example: P
              lastName:
                type: string
                example: Smith
              preferredName:
                type: string
                example: John Smith
              namePrefix:
                type: string
                example: Mr.
              nameSuffix:
                type: string
                example: Jr.
              countryCode:
                type: string
                example: US
              correspondenceAddressBag:
                type: array
                items:
                  type: object
                  properties:
                    nameLineOneText:
                      type: string
                      example: STMicroelectronics S.A.
                    nameLineTwoText:
                      type: string
                      example: Electronics
                    geographicRegionName:
                      type: string
                      example: MN
                    geographicRegionCode:
                      type: string
                      example: Minnesota
                    cityName:
                      type: string
                      example: Montrouge
                    countryCode:
                      type: string
                      example: FR
                    countryName:
                      type: string
                      example: FRANCE
                    postalAddressCategory:
                      type: string
                      example: commercial

        inventorBag:
          type: array
          items:
            type: object
            properties:
              firstName:
                type: string
                example: John
              middleName:
                type: string
                example: K
              lastName:
                type: string
                example: Smith
              namePrefix:
                type: string
                example: Mr.
              nameSuffix:
                type: string
                example: Sr.
              preferredName:
                type: string
                example: John Smith
              countryCode:
                type: string
                example: US
              inventorNameText:
                type: string
                example: Pascal Chevalier
              correspondenceAddressBag:
                type: array
                items:
                  type: object
                  properties:
                    nameLineOneText:
                      type: string
                      example: Pascal  Chevalier
                    nameLineTwoText:
                      type: string
                      example: Name Two
                    geographicRegionName:
                      type: string
                      example: Region Name
                    geographicRegionCode:
                      type: string
                      example: FR
                    cityName:
                      type: string
                      example: Chapareillan
                    countryCode:
                      type: string
                      example: FR
                    countryName:
                      type: string
                      example: FRANCE
                    postalAddressCategory:
                      type: string
                      example: commercial

    PatentTermAdjustment:
      type: object
      description: Patent term adjustment data
      properties:
        aDelayQuantity:
          type: integer
          example: 0
          description: A delays quantity number of adjustments to the term of the patent based upon USPTO delays included in the PTA determination that is mailed as part of the ISSUE NOTIFICATION LETTER.
        adjustmentTotalQuantity:
          type: integer
          example: 0
          description: Patent term adjustment total quantity number that is a summation of NONOVERLAPPING USPTO DELAYS (+/- PTO MANUAL ADJUSTMENTS) - APPLICANT DELAYS.
        applicantDayDelayQuantity:
          type: integer
          example: 28
          description: Patent term adjustment applicant delays quantity number of the patent term due to the Applicant's failure to engage in reasonable efforts to conclude prosecution of the application for the cumulative period in excess of three
        bDelayQuantity:
          type: integer
          example: 0
          description: B delays quantity number of adjustments to the term of the patent based upon the patent failing to issue within three years of the actual filing date of the application at the time that the issue notification letter is generated and an issue date has been established.
        cDelayQuantity:
          type: integer
          example: 0
          description: C delays quantity number of adjustments to the term of the patent based upon USPTO delays caused by interference proceedings, secrecy orders, and successful appellate reviews.
        nonOverlappingDayQuantity:
          type: number
          format: float
          example: 0
          description: Patent term adjustment non overlapping days quantity number of overall summation of the USPTO delays minus any overlapping days.
        overlappingDayQuantity:
          type: number
          format: float
          example: 0
          description: Patent term adjustment overlapping days quantity number that reflects the calculation of overlapping delays consistent with the federal circuit's interpretation.
        patentTermAdjustmentHistoryDataBag:
          type: array
          items:
            type: object
            properties:
              eventDate:
                type: string
                format: "yyyy-MM-dd"
                example: '2016-06-07'
                description: The date that the symbol was assigned to the patent document
              applicantDayDelayQuantity:
                type: integer
                example: 4
              eventDescriptionText:
                type: string
                example: Patent Issue Date Used in PTA Calculation
              eventSequenceNumber:
                type: number
                format: float
                example: 0.5
              ipOfficeDayDelayQuantity:
                type: integer
                example: 0
                description: Number of days the UPSTO personnel adjusting the calculation to increase or decrease the patent term adjustment based upon a request for reconsideration of the patent term adjustment.
              originatingEventSequenceNumber:
                type: number
                format: float
                example: 0
              ptaPTECode:
                type: string
                example: PTA

    ParentContinuityData:
      type: object
      properties:
        firstInventorToFileIndicator:
          type: boolean
          example: true
          description: Indicates first inventor to file.
        parentApplicationStatusCode:
          type: integer
          example: 159
        parentPatentNumber:
          type: string
          example: 8968299
        parentApplicationStatusDescriptionText:
          type: string
          example: Patent Expired Due to NonPayment of Maintenance Fees Under 37 CFR 1.362
        parentApplicationFilingDate:
          type: string
          format: "yyyy-MM-dd"
          example: '2012-05-23'
        parentApplicationNumberText:
          type: string
          example: 123123133
        childApplicationNumberText:
          type: string
          example: 10121016
        claimParentageTypeCode:
          type: string
          example: CODE
        claimParentageTypeCodeDescriptionText:
          type: string
          example: Claims priority from a provisional application
    ChildContinuityData:
      type: object
      properties:
        childApplicationStatusCode:
          type: number
          example: 150
        parentApplicationNumberText:
          type: string
          example: 14104993
        childApplicationNumberText:
          type: string
          example: 14853719
          description: Application number of the child application, which is the unique value assigned by the USPTO to a patent application upon receipt
        childApplicationStatusDescriptionText:
          type: string
          example: Patented Case
        childApplicationFilingDate:
          type: string
          format: "yyyy-MM-dd"
          example: '2015-09-14'
        firstInventorToFileIndicator:
          type: boolean
          example: false
        childPatentNumber:
          type: string
          example: 9704967
        claimParentageTypeCode:
          type: string
          example: DIV
        claimParentageTypeCodeDescriptionText:
          type: string
          example: Claims priority from a provisional application
    ForeignPriority:
      type: object
      properties:
        ipOfficeName:
          type: string
          example: FRANCE
        filingDate:
          type: string
          format: "yyyy-MM-dd"
          example: '2012-12-19'
        applicationNumberText :
          type: string
          example: 1262321

    Assignment:
      type: object
      description: The collection of national assignments related to a patent
      properties:
        reelNumber:
          type: string
          example: 60620
          description: 1-6 digit number identifies the reel number to be used to locate the assignment on microfilm.
        frameNumber:
          type: string
          example: 769
          description: 1-4 digit number that identifies the frame number to be used to locate the first image(page) of the assignment on microfilm.
        reelAndFrameNumber:
          type: string
          example: 60620/769
        pageTotalQuantity:
          type: integer
          example: 16
        imageAvailableStatusCode:
          type: boolean
          example: false
        assignmentDocumentLocationURI:
          type: string
          example: https://legacy-assignments.uspto.gov/assignments/assignment-pat-060620-0769.pdf
        assignmentReceivedDate:
          type: string
          format: "yyyy-MM-dd"
          example: '2022-07-11'
        assignmentRecordedDate:
          type: string
          format: "yyyy-MM-dd"
          example: '2022-07-11'
        assignmentMailedDate:
          type: string
          format: "yyyy-MM-dd"
          example: '2022-07-28'
          description: The date an assignment request was mailed to the office or received by the office
        conveyanceText:
          type: string
          example: ASSIGNMENT OF ASSIGNORS INTEREST (SEE DOCUMENT FOR DETAILS).
          description: A description of the nature of the interest conveyed or transaction to be recorded in an assignment. Examples of the types of descriptions `include:` assignment, security agreement, merger, change of name, license, foreclosure, lien,
        assignorBag:
          type: array
          items:
            type: object
            properties:
              assignorName:
                type: string
                example: STMICROELECTRONICS SA
              executionDate:
                type: string
                format: "yyyy-MM-dd"
                example: '2022-06-30'
        assigneeBag:
          type: array
          items:
            type: object
            properties:
              assigneeNameText:
                type: string
                example: STMICROELECTRONICS SA
              assigneeAddress:
                type: object
                properties:
                  addressLineOneText:
                    type: string
                    example: CHEMIN DU CHAMP-DES-FILLES 39
                  addressLineTwoText:
                    type: string
                    example: 1228 PLAN-LES-OUATES
                  addressLineThreeText:
                    type: string
                    example:
                  addressLineFourText:
                      type: string
                      example:
                  cityName:
                    type: string
                    example: GENEVA
                  geographicRegionName:
                    type: string
                    example: CHX
                  geographicRegionCode:
                    type: string
                  countryName:
                    type: string
                    example: Switzerland
                  postalCode:
                    type: string
                    example: 20123
                  countryOrStateCode:
                    type: string
                    example:
                  ictStateCode:
                      type: string
                      example:
                  ictCountryCode:
                      type: string
                      example:
        correspondenceAddress:
          type: array
          items:
            type: object
            properties:
              correspondentNameText:
                type: string
                example: STMICROELECTRONICS, INC.
              addressLineOneText:
                type: string
                example: 750 CANYON DRIVE
              addressLineTwoText:
                type: string
                example: SUITE 300
              addressLineThreeText:
                type: string
                example: COPPELL, TX 75019
              addressLineFourText:
                type: string
                example: Address Line Four
        domesticRepresentative:
          type: object
          description: US representative for foreign entity
          properties:
            name:
              type: string
              example:
            addressLineOneText:
              type: string
              example:
            addressLineTwoText:
              type: string
              example:
            addressLineThreeText:
              type: string
              example:
            addressLineFourText:
              type: string
              example:
            cityName:
              type: string
              example:
            postalCode:
              type: string
              example:
            geographicRegionName:
              type: string
              example:
            countryName:
              type: string
              example:
            emailAddress:
              type: string
              example:
            lastIngestionDateTime:
              type: string
              example: 2025-04-23T02:47:58


    RecordAttorney:
      type: object
      description: An attorney selected by the applicant or owner of an intellectual property to represent them before the national office.
      properties:
        customerNumberCorrespondenceData:
          type: object
          description: Correspondence address of the application inherited from the customer.
          properties:
              patronIdentifier:
                type: number
                example: 38106
              organizationStandardName:
                type: string
                example:
              powerOfAttorneyAddressBag:
                type: array
                items:
                  type: object
                  properties:
                    nameLineOneText:
                      type: string
                      example: Seed IP Law Group LLP/STMicroelectronics
                    addressLineOneText:
                      type: string
                      example: 701 FIFTH AVENUE, SUITE 5400
                    addressLineTwoText:
                      type: string
                      example: Sample Line Two
                    geographicRegionName:
                      type: string
                      example: WASHINGTON
                    geographicRegionCode:
                      type: string
                      example: WA
                    postalCode:
                      type: string
                      example: 98104-7092
                    cityName:
                      type: string
                      example: SEATTLE
                    countryCode:
                      type: string
                      example: US
                    countryName:
                      type: string
                      example: UNITED STATES
              telecommunicationAddressBag:
                type: array
                items:
                  type: object
                  properties:
                    telecommunicationNumber:
                      type: string
                      example: 206-622-4900
                    extensionNumber:
                      type: string
                      example: 409
                    telecomTypeCode:
                      type: string
                      example: TEL
        powerOfAttorneyBag:
          type: array
          items:
            type: object
            properties:
              firstName:
                type: string
                example: DANIEL
              middleName:
                type: string
                example: D
              lastName:
                type: string
                example: O'BRIEN
              namePrefix:
                type: string
                example: Dr
              nameSuffix:
                type: string
                example: Jr.
              preferredName:
                type: string
              countryCode:
                type: string
                example: US
              registrationNumber:
                type: string
                example: 65545
              activeIndicator:
                type: string
                example: ACTIVE
              registeredPractitionerCategory:
                type: string
                example: ATTNY
              attorneyAddressBag:
                type: array
                items:
                  type: object
                  properties:
                    nameLineOneText:
                      type: string
                      example: SEED IP LAW  GROUP LLP
                    nameLineTwoText:
                      type: string
                      example: STOCKTON
                    addressLineOneText:
                      type: string
                      example: 701 FIFTH AVENUE
                    addressLineTwoText:
                      type: string
